services:
  api:
    build: .
    image: outlet-monitor-api-prod
    environment:
      - HOURS_BETWEEN_FETCH=${HOURS_BETWEEN_FETCH:-24}
      # Where scrape results are pushed for Telegram broadcast. Deliberately no
      # depends_on: the notifier being down must never hold back a scrape.
      # Set to an empty string to disable notifications.
      - NOTIFIER_URL=${NOTIFIER_URL-http://notifier:8000}
    volumes:
      - outlet-monitor-data:/workspace/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    image: outlet-monitor-frontend-prod
    # Loopback-only: reachable from nginx on the same host, never directly
    # from the internet. nginx terminates TLS on :7716 and proxies here.
    # Host-side port is 3001 (not 7716) because nginx's `listen 7716` binds
    # the wildcard address, which already covers 127.0.0.1:7716 — Docker
    # can't also bind that same host:port. Container-internal port stays 3000.
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - API_INTERNAL_URL=http://api:5000
      - SCRAPE_SECRET=${SCRAPE_SECRET}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build: ./telegram_notifier
    image: outlet-monitor-notifier-prod
    # Internal-only: reachable from the other services as http://notifier:8000,
    # never published to the host or the internet.
    expose:
      - "8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - notifier-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  outlet-monitor-data:
  notifier-data:
