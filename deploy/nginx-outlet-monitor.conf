# Third server block for /etc/nginx/sites-available/murilopreto.com.br
# (appended alongside the existing :80 redirect and :443 default-homepage
# blocks — reuses the same certbot-issued cert, since it already covers
# both murilopreto.com.br and www.murilopreto.com.br).
#
# Proxies to the outlet-monitor frontend container, which docker-compose.prod.yml
# publishes to 127.0.0.1:3001 only (never directly reachable from the internet).
# (Not 7716 — this `listen 7716` directive itself binds the wildcard address,
# which already covers 127.0.0.1:7716, so Docker can't also bind that.)

server {
    listen 7716 ssl;
    server_name murilopreto.com.br www.murilopreto.com.br;

    ssl_certificate /etc/letsencrypt/live/murilopreto.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/murilopreto.com.br/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
