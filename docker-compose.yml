services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Where scrape results are pushed for Telegram broadcast. Deliberately no
      # depends_on: the notifier being down must never hold back a scrape.
      # Set to an empty string to disable notifications.
      - NOTIFIER_URL=http://notifier:8000
    volumes:
      - .:/workspace
      - outlet-monitor-data:/workspace/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/workspace
      - frontend-node-modules:/workspace/node_modules
    environment:
      - API_INTERNAL_URL=http://api:5000
    depends_on:
      - api

  notifier:
    build: ./telegram_notifier
    # Internal-only: reachable from the other services as http://notifier:8000,
    # never published to the host.
    expose:
      - "8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - notifier-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  outlet-monitor-data:
  frontend-node-modules:
  notifier-data:
